name: Actualizar datos de pesca

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar script
        run: python update_data.py

      - name: Subir cambios a GitHub
        run: |
          git config user.name "Tomba Bot"
          git config user.email "bot@tombaflyfishing.com"
          git fetch origin
          git reset --hard origin/main
          python update_data.py
          git add index.html datos.json
          git diff --staged --quiet || git commit -m "Datos actualizados - $(date '+%d/%m/%Y %H:%M')"
          git push
